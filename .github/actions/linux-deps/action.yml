name: Linux prerequisites
description: >
  The apt packages every Linux job needs — Tauri's webview/gtk stack plus the
  PipeWire/wayland/x11/alsa headers pre-positioned for Phase 1 capture/audio.
  Shared by ci.yml and release.yml so the list can never drift between them.
runs:
  using: composite
  steps:
    - name: Install apt packages
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf \
          libxcb1-dev libxrandr-dev libxkbcommon-dev libxkbcommon-x11-dev \
          libpipewire-0.3-dev libwayland-dev libasound2-dev libssl-dev \
          libudev-dev
