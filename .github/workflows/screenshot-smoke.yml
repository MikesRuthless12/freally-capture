# Cross-OS "loads cleanly" screenshot smoke.
#
# Builds the release binary on Windows / macOS / Linux, launches it, and checks
# it came up — so the studio UI (and, as they land, the per-OS native preview
# surfaces) is verified on every OS without owning that hardware.
#
# The check is per-OS, matched to what each headless runner can actually prove:
#   * Windows + macOS: capture the screen and ASSERT the frame isn't blank (the
#     `screenshot_check` example fails the job on a missing / uniform-black
#     capture). Both genuinely render the full UI, so this is a real pixel gate.
#   * Linux: WebKitGTK does NOT software-render its web content under headless
#     Xvfb (no GPU/DRM — the frame stays black however the env is tuned), so a
#     pixel gate can't apply. Instead assert the reliably-observable facts: the
#     app launches, stays up, and maps a correctly-created window. Real Linux
#     visual proof arrives with NP.5's native (lavapipe) Vulkan surface, which
#     renders independently of WebKitGTK.
#
# Runs on demand and on the native-preview branch. CI runners have no discrete
# GPU (software rasterizer: WARP / lavapipe), so this proves the app boots +
# comes up cleanly, not raw performance.
name: Screenshot smoke

on:
  workflow_dispatch:
  push:
    branches: [native-preview, native-preview-wgpu]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # A launched app that panics should still let us grab the screenshot.
  RUST_BACKTRACE: 1
  # Seed a magenta scene + force the preview region on launch, so the headless
  # screenshot actually exercises the native GPU surface (Windows DComp / macOS
  # CAMetalLayer) — the UI never reports a region without interaction. A magenta
  # frame + the "native preview: surface created" log line prove the native path.
  FCAP_SMOKE: "1"

jobs:
  screenshot:
    name: launch + screenshot (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux prerequisites
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/linux-deps
      - name: Install Linux screenshot tools
        if: matrix.os == 'ubuntu-latest'
        # openbox: a minimal window manager so the app window is managed + mapped
        # under Xvfb. xdotool locates + sizes it (headless GTK brings the window
        # up collapsed at ~10x10); x11-utils' xwininfo logs the geometry.
        run: sudo apt-get update && sudo apt-get install -y xvfb imagemagick openbox x11-utils xdotool
      - name: Install the pinned toolchain
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build the app (release, UI embedded)
        run: npm run tauri -- build --no-bundle

      # -- launch + screenshot, per OS -----------------------------------------
      - name: Launch + screenshot (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $exe = "target/release/freally-capture.exe"
          $p = Start-Process -FilePath $exe -PassThru
          Start-Sleep -Seconds 25
          Add-Type -AssemblyName System.Windows.Forms, System.Drawing
          $b = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bmp = New-Object System.Drawing.Bitmap $b.Width, $b.Height
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.CopyFromScreen($b.Location, [System.Drawing.Point]::Empty, $b.Size)
          $bmp.Save("$PWD/screenshot-windows.png")
          if (-not $p.HasExited) { Stop-Process -Id $p.Id -Force }
          "captured: $(Test-Path screenshot-windows.png)"

      - name: Launch + screenshot (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          ./target/release/freally-capture &
          APP_PID=$!
          sleep 25
          screencapture -x screenshot-macos.png || echo "screencapture failed"
          kill $APP_PID 2>/dev/null || true
          ls -la screenshot-macos.png || true

      - name: Launch + verify the window maps + screenshot (Linux, Xvfb)
        if: matrix.os == 'ubuntu-latest'
        env:
          # Best-effort software-render hints. NOTE: even with all of these,
          # WebKitGTK does not software-render its web content under headless
          # Xvfb on the runners (no GPU/DRM) — the captured frame stays black.
          # So Linux does NOT assert non-blank pixels (Windows + macOS do); it
          # asserts the app launches and maps its window (see the gate below).
          WEBKIT_DISABLE_DMABUF_RENDERER: "1"
          WEBKIT_DISABLE_COMPOSITING_MODE: "1"
          LIBGL_ALWAYS_SOFTWARE: "1"
          # Force the X11 GDK backend so GTK never tries Wayland on the runner.
          GDK_BACKEND: "x11"
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1600x1000x24 >/dev/null 2>&1 &
          sleep 3
          # openbox manages + maps the window (without a WM it isn't managed).
          openbox &
          sleep 2
          ./target/release/freally-capture &
          APP_PID=$!
          # Headless GTK brings the window up collapsed at ~10x10; give it a
          # moment to map, then size it to the screen so the (documentary)
          # screenshot shows the real window rectangle rather than a speck.
          sleep 12
          WIN=$(xdotool search --class '[Ff]really' 2>/dev/null | head -1 || true)
          echo "app window id: ${WIN:-<none>}"
          if [ -n "$WIN" ]; then
            xdotool windowsize "$WIN" 1600 1000
            xdotool windowmove "$WIN" 0 0
            xdotool windowactivate "$WIN" 2>/dev/null || true
          fi
          sleep 6
          echo "--- xwininfo (freally window) ---"
          xwininfo -root -tree 2>&1 | grep -i freally || true
          # Capture for the record (expected black — WebKitGTK doesn't paint
          # headless); the upload step keeps it either way.
          import -window root screenshot-linux.png || echo "import failed"
          # -- Linux gate: assert what is reliably observable headless ----------
          # No pixel check here (WebKitGTK won't render under Xvfb). Fail only if
          # the app died before capture or never created its top-level window —
          # that catches a crash-on-launch, a missing system lib, or a GTK/WebKit
          # init failure, which is the real smoke signal this job can give.
          if ! kill -0 "$APP_PID" 2>/dev/null; then
            echo "FAIL: the app process exited before capture — it did not stay up"
            exit 1
          fi
          if [ -z "$WIN" ]; then
            echo "FAIL: no Freally Capture window mapped — the app never created its window"
            kill "$APP_PID" 2>/dev/null || true
            exit 1
          fi
          echo "OK: app alive (pid $APP_PID) and window $WIN mapped"
          kill "$APP_PID" 2>/dev/null || true
          ls -la screenshot-linux.png || true

      # -- assert the frame rendered (the enforced pixel gate) -----------------
      # Windows + macOS only — both render the full UI. Linux asserts launch +
      # window-mapped in its own step above (WebKitGTK won't paint headless).
      # bash runs on both runners (Git Bash on Windows); each matrix job produced
      # exactly one screenshot-<os>.png. Runs before the upload so a blank frame
      # still fails the job *and* keeps its artifact for debugging.
      - name: Assert the screenshot rendered (not blank)
        if: matrix.os != 'ubuntu-latest'
        shell: bash
        run: |
          shopt -s nullglob
          shots=(screenshot-*.png)
          if [ ${#shots[@]} -eq 0 ]; then
            echo "screenshot_check: no screenshot was captured — the launch/capture step failed"
            exit 1
          fi
          cargo run --release -p fcap-sources --example screenshot_check -- "${shots[0]}"

      - name: Upload the screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-${{ matrix.os }}
          path: screenshot-*.png
          if-no-files-found: warn
