# Cross-OS "loads cleanly" screenshot smoke.
#
# Builds the release binary on Windows / macOS / Linux, launches it, captures
# the screen, and **asserts the frame actually rendered** (the `screenshot_check`
# example fails the job on a missing / blank / uniform-black capture) before
# uploading it as an artifact — so the studio UI (and, as they land, the per-OS
# native preview surfaces) is *enforced* to draw on every OS without owning that
# hardware, not just eyeballed after the fact. This is the CI-only verification
# loop the macOS (NP.4) / Linux (NP.5) native surfaces depend on. Runs on demand
# and on the native-preview branch. CI runners have no discrete GPU: wgpu uses a
# software rasterizer (WARP / lavapipe), so this proves the app boots + renders
# cleanly, not raw performance.
name: Screenshot smoke

on:
  workflow_dispatch:
  push:
    branches: [native-preview, native-preview-wgpu]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # A launched app that panics should still let us grab the screenshot.
  RUST_BACKTRACE: 1

jobs:
  screenshot:
    name: launch + screenshot (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux prerequisites
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/linux-deps
      - name: Install Linux screenshot tools
        if: matrix.os == 'ubuntu-latest'
        # openbox: a minimal window manager — without one under Xvfb the GTK/
        # WebKitGTK window never receives the map/expose events it needs to
        # paint, so the root capture comes back pure black. x11-utils gives us
        # xwininfo for the diagnostic dump below.
        run: sudo apt-get update && sudo apt-get install -y xvfb imagemagick openbox x11-utils xdotool
      - name: Install the pinned toolchain
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build the app (release, UI embedded)
        run: npm run tauri -- build --no-bundle

      # -- launch + screenshot, per OS -----------------------------------------
      - name: Launch + screenshot (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $exe = "target/release/freally-capture.exe"
          $p = Start-Process -FilePath $exe -PassThru
          Start-Sleep -Seconds 25
          Add-Type -AssemblyName System.Windows.Forms, System.Drawing
          $b = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bmp = New-Object System.Drawing.Bitmap $b.Width, $b.Height
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.CopyFromScreen($b.Location, [System.Drawing.Point]::Empty, $b.Size)
          $bmp.Save("$PWD/screenshot-windows.png")
          if (-not $p.HasExited) { Stop-Process -Id $p.Id -Force }
          "captured: $(Test-Path screenshot-windows.png)"

      - name: Launch + screenshot (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          ./target/release/freally-capture &
          APP_PID=$!
          sleep 25
          screencapture -x screenshot-macos.png || echo "screencapture failed"
          kill $APP_PID 2>/dev/null || true
          ls -la screenshot-macos.png || true

      - name: Launch + screenshot (Linux, Xvfb)
        if: matrix.os == 'ubuntu-latest'
        env:
          # WebKitGTK paints a black window under Xvfb (no GPU / DRM device)
          # unless its DMABUF / accelerated-compositing path is disabled — force
          # the software renderer so the webview actually draws. LIBGL_ALWAYS_
          # SOFTWARE steers wgpu + GL to the software rasterizer (lavapipe) too.
          WEBKIT_DISABLE_DMABUF_RENDERER: "1"
          WEBKIT_DISABLE_COMPOSITING_MODE: "1"
          LIBGL_ALWAYS_SOFTWARE: "1"
          # Force the X11 GDK backend so GTK never tries Wayland on the runner.
          GDK_BACKEND: "x11"
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1600x1000x24 >/dev/null 2>&1 &
          sleep 3
          # A window manager maps + exposes the window; without one WebKitGTK
          # never paints and the root capture is pure black (the failure the
          # screenshot_check gate exposed — the env flags alone weren't enough).
          openbox &
          sleep 2
          ./target/release/freally-capture &
          APP_PID=$!
          # Under headless GTK the window comes up collapsed to ~10x10 (the
          # configured 1280x800 isn't honoured without a real display), so the
          # capture is almost all root background. Give it a moment to map, then
          # force it to fill the screen — that size-allocate makes WebKitGTK lay
          # out and paint the full UI — and let it repaint before the grab.
          sleep 12
          WIN=$(xdotool search --class '[Ff]really' 2>/dev/null | head -1 || true)
          echo "app window id: ${WIN:-<none>}"
          if [ -n "$WIN" ]; then
            xdotool windowsize "$WIN" 1600 1000
            xdotool windowmove "$WIN" 0 0
            xdotool windowactivate "$WIN" 2>/dev/null || true
          fi
          sleep 10
          echo "--- xwininfo (freally window after resize) ---"
          xwininfo -root -tree 2>&1 | grep -i freally || true
          import -window root screenshot-linux.png || echo "import failed"
          kill $APP_PID 2>/dev/null || true
          ls -la screenshot-linux.png || true

      # -- assert the frame rendered (the enforced gate) -----------------------
      # bash runs on all three runners (Git Bash on Windows); each matrix job
      # produced exactly one screenshot-<os>.png. Runs before the upload so a
      # blank frame still fails the job *and* keeps its artifact for debugging.
      - name: Assert the screenshot rendered (not blank)
        shell: bash
        run: |
          shopt -s nullglob
          shots=(screenshot-*.png)
          if [ ${#shots[@]} -eq 0 ]; then
            echo "screenshot_check: no screenshot was captured — the launch/capture step failed"
            exit 1
          fi
          cargo run --release -p fcap-sources --example screenshot_check -- "${shots[0]}"

      - name: Upload the screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-${{ matrix.os }}
          path: screenshot-*.png
          if-no-files-found: warn
