# Phase 0 CI — the gate every phase must keep green on all three OSes.
#
# Mirrors the local checks exactly (README "Build & run"): rustfmt, clippy
# -D warnings, cargo test, cargo-deny/cargo-audit, and the UI's
# prettier/eslint/tsc/vitest/build, plus a Tauri debug compile per OS.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  cargo-deny:
    name: cargo-deny (licenses + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          log-level: warn
          command: check
          arguments: --all-features

  cargo-audit:
    name: cargo-audit (RustSec advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo audit
        # Keep any --ignore flags here in lockstep with [advisories] ignore
        # in deny.toml — update both atomically.
        run: cargo audit

  ui:
    name: UI (prettier + eslint + tsc + vitest + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:ui
      - run: npm run build

  clippy-test:
    name: clippy + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux prerequisites (webview/gtk + future capture/audio)
        if: matrix.os == 'ubuntu-latest'
        # PipeWire/wayland/x11/alsa are pre-positioned for Phase 1+ capture
        # and audio work, per the build plan.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf \
            libxcb1-dev libxrandr-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libpipewire-0.3-dev libwayland-dev libasound2-dev libssl-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  tauri-build:
    name: Tauri debug build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux prerequisites (webview/gtk + future capture/audio)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf \
            libxcb1-dev libxrandr-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libpipewire-0.3-dev libwayland-dev libasound2-dev libssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Tauri build (debug, compile-only)
        # --no-bundle keeps this a compile smoke — full bundling + installers
        # are exercised by release.yml on tags.
        run: npm run tauri -- build --debug --no-bundle
