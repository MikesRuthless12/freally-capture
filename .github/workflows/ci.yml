# Phase 0 CI — the gate every phase must keep green on all three OSes.
#
# Mirrors the local checks exactly (README "Build & run"): rustfmt, clippy
# -D warnings, cargo test, cargo-deny/cargo-audit, and the UI's
# prettier/eslint/tsc/vitest/build, plus a Tauri debug compile per OS.
#
# The Rust toolchain comes from rust-toolchain.toml (pinned) — `rustup
# toolchain install` reads it, so the pin lives in exactly one place.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# A superseded push doesn't need its 45-minute matrix — cancel it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install the pinned toolchain
        run: rustup toolchain install
      - run: cargo fmt --all -- --check

  cargo-deny:
    name: cargo-deny (licenses + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          log-level: warn
          command: check

  cargo-audit:
    name: cargo-audit (RustSec advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install the pinned toolchain
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo audit
        # Unmaintained-class advisories are warnings here (they don't fail
        # audit); the deny.toml [advisories] ignore list documents each one.
        # The two quick-xml DoS advisories are vulnerability-class and must be
        # ignored explicitly — justified in deny.toml (trusted-local-file
        # parsing via plist inside the tauri tree; no compatible upgrade until
        # a plist/tauri bump — re-check on every Tauri upgrade).
        run: cargo audit --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195

  ui:
    name: UI (prettier + eslint + vitest + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      # `npm run build` runs `tsc --noEmit` first, so no separate typecheck.
      - run: npm run test:ui
      - run: npm run build

  clippy-test:
    name: clippy + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux prerequisites
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/linux-deps
      - name: Install the pinned toolchain
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  tauri-build:
    name: Tauri debug build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux prerequisites
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/linux-deps
      - name: Install the pinned toolchain
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Tauri build (debug, compile-only)
        # --no-bundle keeps this a compile smoke — full bundling + installers
        # are exercised by release.yml on tags.
        run: npm run tauri -- build --debug --no-bundle
