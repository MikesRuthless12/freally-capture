# cargo-deny — dependency licenses, advisories, bans, and sources.
# Run locally with `cargo deny check`; CI runs it on every push.

[graph]
all-features = true

[advisories]
yanked = "deny"
# Every entry below is an UNMAINTAINED-class advisory (no vulnerability):
# `cargo audit` reports them as warnings and stays green. They come with
# Tauri v2's Linux webview stack, which still binds GTK3 — the gtk-rs GTK3
# bindings (RUSTSEC-2024-0411..0420) are archived upstream, plus a handful
# of unmaintained transitive utility crates in the same tree. Tauri's GTK4
# migration removes these; revisit on Tauri upgrades. None are reachable
# vulnerabilities; the same set is ignored across the Freally repos.
ignore = [
  "RUSTSEC-2024-0370", # proc-macro-error — unmaintained (tauri macro tree)
  "RUSTSEC-2024-0411", # gtk-rs GTK3 bindings — archived upstream
  "RUSTSEC-2024-0412",
  "RUSTSEC-2024-0413",
  "RUSTSEC-2024-0414",
  "RUSTSEC-2024-0415",
  "RUSTSEC-2024-0416",
  "RUSTSEC-2024-0417",
  "RUSTSEC-2024-0418",
  "RUSTSEC-2024-0419",
  "RUSTSEC-2024-0420",
  "RUSTSEC-2025-0075", # unmaintained transitive crates in the tauri tree
  "RUSTSEC-2025-0080",
  "RUSTSEC-2025-0081",
  "RUSTSEC-2025-0098",
  "RUSTSEC-2025-0100",
  "RUSTSEC-2024-0436", # paste — unmaintained proc-macro (nokhwa's webcam tree); no vulnerability
  "RUSTSEC-2026-0192", # ttf-parser — unmaintained (author archived it); pinned by the rustybuzz +
                       # fontdb text-shaping stack (Phase 2 Text source). No vulnerability. Revisit
                       # if/when the shaping stack moves (e.g. to skrifa).
  "RUSTSEC-2026-0206", # rustybuzz — unmaintained (same archived shaping stack as 2026-0192; the
                       # advisory reports "no safe upgrade available"). No vulnerability. Goes away
                       # together with the ttf-parser one when the shaping stack moves.
]

[licenses]
# The workspace's own crates are proprietary (publish = false) — license
# checks apply to third-party dependencies only.
private = { ignore = true }
confidence-threshold = 0.8
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "BSL-1.0",
  "MPL-2.0",
  "Unicode-3.0",
  "CDLA-Permissive-2.0",
  # libjpeg lineage (jpeg-encoder, mozjpeg via nokhwa's MJPEG decode) —
  # permissive; requires the IJG acknowledgment in THIRD-PARTY-NOTICES.md.
  "IJG",
]

# Narrow per-crate allowances (kept out of the global list on purpose).
# Both arrived with the wgpu tree when the Phase 2 compositor made it a real
# dependency; both licenses are permissive.
[[licenses.exceptions]]
name = "hexf-parse"     # CC0 hex-float parser inside wgpu-core's WGSL path
allow = ["CC0-1.0"]

[[licenses.exceptions]]
name = "libfuzzer-sys"  # feature-gated fuzzing shim (all-features graph only — never shipped)
allow = ["NCSA"]

[[licenses.exceptions]]
name = "tiny-keccak"    # CC0 keccak hash inside tauri-plugin-deep-link's chain (TASK-R2)
allow = ["CC0-1.0"]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
