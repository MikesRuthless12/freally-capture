# cargo-deny — dependency licenses, advisories, bans, and sources.
# Run locally with `cargo deny check`; CI runs it on every push.

[graph]
all-features = true

[advisories]
yanked = "deny"
# Keep any `ignore` entries here in lockstep with the cargo-audit --ignore
# flags in .github/workflows/ci.yml — update both atomically, with a comment
# explaining each exception.
ignore = []

[licenses]
# The workspace's own crates are proprietary (publish = false) — license
# checks apply to third-party dependencies only.
private = { ignore = true }
confidence-threshold = 0.8
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "BSL-1.0",
  "MPL-2.0",
  "Unicode-3.0",
  "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
